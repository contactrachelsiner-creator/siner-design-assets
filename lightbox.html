<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--black:#080808;--white:#f5f0e8;--accent:#c8a96e;--gray:#141414;--muted:#666;--border:rgba(245,240,232,0.08);}
body{background:transparent;font-family:'Montserrat',sans-serif;color:var(--white);}
.rs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:2px;}
.rs-poster{position:relative;aspect-ratio:2/3;overflow:hidden;cursor:pointer;background:var(--gray);}
.rs-poster img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease;display:block;}
.rs-poster:hover img{transform:scale(1.05);}
.rs-poster-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,0.92) 0%,transparent 55%);opacity:0;transition:opacity 0.35s;display:flex;flex-direction:column;justify-content:flex-end;padding:1.2rem;}
.rs-poster:hover .rs-poster-overlay{opacity:1;}
.rs-poster-badge{position:absolute;top:0.75rem;right:0.75rem;background:rgba(200,169,110,0.15);border:1px solid rgba(200,169,110,0.4);padding:0.25rem 0.55rem;font-size:0.48rem;font-weight:700;letter-spacing:0.15em;color:var(--accent);text-transform:uppercase;opacity:0;transition:opacity 0.35s;}
.rs-poster:hover .rs-poster-badge{opacity:1;}
.rs-poster-net{font-size:0.5rem;font-weight:700;letter-spacing:0.2em;color:var(--accent);text-transform:uppercase;margin-bottom:0.25rem;}
.rs-poster-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;line-height:1;color:var(--white);letter-spacing:0.03em;}
.rs-lb{display:none;position:fixed;inset:0;z-index:99999;background:rgba(8,8,8,0.98);flex-direction:column;}
.rs-lb.open{display:flex;}
.rs-lb-top{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.rs-lb-meta{display:flex;flex-direction:column;gap:0.2rem;}
.rs-lb-net{font-size:0.52rem;font-weight:700;letter-spacing:0.25em;color:var(--accent);text-transform:uppercase;}
.rs-lb-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;line-height:1;letter-spacing:0.02em;color:var(--white);}
.rs-lb-close{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:0.58rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;padding:0.6rem 1.2rem;cursor:pointer;transition:all 0.2s;font-family:'Montserrat',sans-serif;}
.rs-lb-close:hover{border-color:var(--white);color:var(--white);}
.rs-lb-body{display:flex;flex:1;overflow:hidden;min-height:0;}
.rs-lb-main{flex:1;display:flex;align-items:center;justify-content:center;position:relative;padding:2rem 4rem;min-width:0;}
.rs-lb-img-wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative;}
.rs-lb-img{max-width:100%;max-height:100%;object-fit:contain;display:block;}
.rs-lb-caption{position:absolute;bottom:-1.8rem;left:0;right:0;text-align:center;font-size:0.58rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);}
.rs-lb-prev,.rs-lb-next{position:absolute;top:50%;transform:translateY(-50%);background:transparent;border:1px solid var(--border);color:var(--white);width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all 0.2s;font-family:'Montserrat',sans-serif;}
.rs-lb-prev{left:0.75rem;}
.rs-lb-next{right:0.75rem;}
.rs-lb-prev:hover,.rs-lb-next:hover{background:var(--accent);border-color:var(--accent);color:var(--black);}
.rs-lb-prev:disabled,.rs-lb-next:disabled{opacity:0.2;pointer-events:none;}
.rs-lb-sidebar{width:180px;border-left:1px solid var(--border);overflow-y:auto;padding:0.75rem;display:flex;flex-direction:column;gap:3px;flex-shrink:0;}
.rs-lb-sidebar::-webkit-scrollbar{width:3px;}
.rs-lb-sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.rs-lb-thumb{aspect-ratio:3/2;cursor:pointer;overflow:hidden;border:1px solid transparent;transition:border-color 0.2s;flex-shrink:0;position:relative;background:var(--gray);}
.rs-lb-thumb.active{border-color:var(--accent);}
.rs-lb-thumb:hover{border-color:rgba(200,169,110,0.4);}
.rs-lb-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.rs-lb-thumb-num{position:absolute;bottom:0.3rem;right:0.4rem;font-size:0.45rem;font-weight:700;color:rgba(245,240,232,0.5);}
.rs-lb-bottom{padding:0.9rem 2rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rs-lb-counter{font-size:0.58rem;font-weight:700;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;}
.rs-lb-counter span{color:var(--white);}
.rs-lb-tags{display:flex;gap:0.4rem;flex-wrap:wrap;}
.rs-lb-tag{font-size:0.48rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:0.25rem 0.6rem;border:1px solid var(--border);color:var(--muted);}
</style>
</head>
<body>
<div class="rs-grid" id="rs-grid"></div>
<div class="rs-lb" id="rs-lb">
  <div class="rs-lb-top">
    <div class="rs-lb-meta">
      <div class="rs-lb-net" id="rs-lb-net"></div>
      <div class="rs-lb-title" id="rs-lb-title"></div>
    </div>
    <button class="rs-lb-close" onclick="closeLB()">&#x2715; Close</button>
  </div>
  <div class="rs-lb-body">
    <div class="rs-lb-main">
      <button class="rs-lb-prev" id="rs-lb-prev" onclick="nav(-1)">&#8592;</button>
      <div class="rs-lb-img-wrap">
        <img class="rs-lb-img" id="rs-lb-img" src="" alt="" />
        <div class="rs-lb-caption" id="rs-lb-caption"></div>
      </div>
      <button class="rs-lb-next" id="rs-lb-next" onclick="nav(1)">&#8594;</button>
    </div>
    <div class="rs-lb-sidebar" id="rs-lb-thumbs"></div>
  </div>
  <div class="rs-lb-bottom">
    <div class="rs-lb-counter">Image <span id="rs-lb-cur">1</span> of <span id="rs-lb-total">1</span></div>
    <div class="rs-lb-tags" id="rs-lb-tags"></div>
  </div>
</div>
<script>
var B='https://contactrachelsiner-creator.github.io/siner-design-assets/';
var P=[
  {title:'Blade Runner',network:'Warner Bros.',tags:['Key Art','Campaign Creative'],cover:B+'BLADE%20RUNNER/0.jpg',images:[{src:B+'BLADE%20RUNNER/0.jpg',label:'Variant 1'},{src:B+'BLADE%20RUNNER/2.jpg',label:'Variant 2'},{src:B+'BLADE%20RUNNER/4.jpg',label:'Variant 3'},{src:B+'BLADE%20RUNNER/9.jpg',label:'Variant 4'}]},
  {title:'Bros',network:'Universal',tags:['Key Art','Art Direction'],cover:B+'BROS/5867_2_RBOSV_Backside_Vert_Rotational_F5%20copy.jpg',images:[{src:B+'BROS/5867_2_RBOSV_Backside_Vert_Rotational_F5%20copy.jpg',label:'Key Art'}]},
  {title:'Canga\u00e7o Novo',network:'Prime Video',tags:['Key Art','Campaign Creative'],cover:B+'CANGACO/Canga%C3%A7o_Novo_S1_J5281_5500x3500_F11_opnCnvs_Vert_English.jpg',images:[{src:B+'CANGACO/Canga%C3%A7o_Novo_S1_J5281_5500x3500_F11_opnCnvs_Vert_English.jpg',label:'Key Art'}]},
  {title:'Case 63',network:'Spotify / Gimlet',tags:['Key Art','Art Direction'],cover:B+'CASE%2063/case%2063%20vert.jpg',images:[{src:B+'CASE%2063/case%2063%20vert.jpg',label:'Vertical'},{src:B+'CASE%2063/CASE%2063%20SQUARE.jpg',label:'Square'},{src:B+'CASE%2063/CASE63_HORIZ%20copy.jpg',label:'Horizontal'},{src:B+'CASE%2063/J5511_1_Case63_Gimlet_3000x3000_36F.jpg',label:'Album Art'}]},
  {title:'Criminal Minds: Evolution',network:'Paramount+',tags:['Key Art','Campaign Creative','Art Direction'],cover:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver12_xlg.jpg',images:[{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver12_xlg.jpg',label:'Version 12'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver13_xlg.jpg',label:'Version 13'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver14_xlg.jpg',label:'Version 14'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver15_xlg.jpg',label:'Version 15'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver16_xlg.jpg',label:'Version 16'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver17_xlg.jpg',label:'Version 17'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver18_xlg.jpg',label:'Version 18'},{src:B+'CRIMINAL%20MINDS/criminal_minds_evolution_ver19_xlg.jpg',label:'Version 19'}]},
  {title:'DOM \u2014 Season 3',network:'Prime Video',tags:['Key Art','Campaign Creative'],cover:B+'DOM%20S3/Dom-web.jpg',images:[{src:B+'DOM%20S3/Dom-web.jpg',label:'Dom'},{src:B+'DOM%20S3/Dom-Horiz-web.jpg',label:'Horizontal'},{src:B+'DOM%20S3/Calibri-web.jpg',label:'Calibri'},{src:B+'DOM%20S3/Jasmin-web.jpg',label:'Jasmin'},{src:B+'DOM%20S3/Tease-Web.jpg',label:'Tease'},{src:B+'DOM%20S3/victor-web.jpg',label:'Victor'},{src:B+'DOM%20S3/vivi-web.jpg',label:'Vivi'}]},
  {title:'Frederick Douglass',network:'PBS',tags:['Key Art','Art Direction'],cover:B+'FREDRICK/011_J5314_FrederickDouglass_1sheet_13_5x20_RGB_RS01.jpg',images:[{src:B+'FREDRICK/011_J5314_FrederickDouglass_1sheet_13_5x20_RGB_RS01.jpg',label:'One Sheet'}]},
  {title:'Motherland: Fort Salem',network:'Freeform',tags:['Key Art','Campaign Creative'],cover:B+'PANTHER/000_Motherland_KA_PAYOFF_R1_CRHRS_C01.jpg',images:[{src:B+'PANTHER/000_Motherland_KA_PAYOFF_R1_CRHRS_C01.jpg',label:'Payoff'},{src:B+'PANTHER/000_Motherland_KA_R1_RS_C02.jpg',label:'Alt'}]},
  {title:'The Punisher',network:'Netflix / Marvel',tags:['Key Art','Art Direction'],cover:B+'PUNISHER/PUNISHER%201.jpeg',images:[{src:B+'PUNISHER/PUNISHER%201.jpeg',label:'Version 1'},{src:B+'PUNISHER/PUNISHER%202.jpg',label:'Version 2'},{src:B+'PUNISHER/PUNISHER%203.jpg',label:'Version 3'}]},
  {title:'Queens',network:'Nat Geo / Hulu / Disney+',tags:['Key Art','Campaign Creative'],cover:B+'QUEENS/5751_1_Queens_Alt_8.5x12.6_F4.jpg',images:[{src:B+'QUEENS/5751_1_Queens_Alt_8.5x12.6_F4.jpg',label:'Key Art'}]},
  {title:'Rescue',network:'Disney',tags:['Key Art','Art Direction'],cover:B+'RESCUE/RESCUE%20DISNEY.jpg',images:[{src:B+'RESCUE/RESCUE%20DISNEY.jpg',label:'Disney Version'},{src:B+'RESCUE/RESCUE.jpeg',label:'Alt Version'}]},
  {title:'Fifty States of Fright',network:'Quibi',tags:['Key Art','Campaign Creative'],cover:B+'STATES/FIFTY%20STATES.jpg',images:[{src:B+'STATES/FIFTY%20STATES.jpg',label:'Key Art'}]},
  {title:'UFC 254: Khabib vs. Gaethje',network:'UFC / ESPN+',tags:['Key Art','Sports'],cover:B+'UFC/UFC_Rachel%20Siner.jpg',images:[{src:B+'UFC/UFC_Rachel%20Siner.jpg',label:'Key Art'}]},
  {title:'Woke',network:'Hulu',tags:['Key Art','Campaign Creative'],cover:B+'WOKE/WOKE_SM.jpg',images:[{src:B+'WOKE/WOKE_SM.jpg',label:'Key Art'}]},
  {title:'Lost in Space \u2014 Season 3',network:'Netflix',tags:['Key Art','Campaign Creative'],cover:B+'LostInSpaceS3_KA_R1_RS01a.jpg',images:[{src:B+'LostInSpaceS3_KA_R1_RS01a.jpg',label:'Key Art'},{src:B+'LostInSpaceS3_KA_R1_RS01bv2-sm.jpg',label:'Variant'},{src:B+'28_LostInSpaceS3_KA_R1_RS04.jpg',label:'Version 4'},{src:B+'38_LostInSpaceS3_27x20_R1_RS06a.jpg',label:'Version 6a'},{src:B+'39_LostInSpaceS3_27x20_R1_RS06b.jpg',label:'Version 6b'}]},
  {title:'Red Notice',network:'Netflix',tags:['Key Art','Art Direction'],cover:B+'RedNotice_KA_RS_RS08_.jpg',images:[{src:B+'RedNotice_KA_RS_RS08_.jpg',label:'Version 1'},{src:B+'RedNotice_KA_RS_RS08a_.jpg',label:'Version 2'},{src:B+'RedNotice_KA_RS_RS08b_.jpg',label:'Version 3'},{src:B+'RedNotice_KA_RS_RS08c_.jpg',label:'Version 4'}]}
];
var ci=0,ci2=0;
var g=document.getElementById('rs-grid');
P.forEach(function(p,i){
  var d=document.createElement('div');
  d.className='rs-poster';
  d.onclick=function(){openLB(i);};
  d.innerHTML='<img src="'+p.cover+'" alt="'+p.title+'" loading="lazy"/><div class="rs-poster-badge">'+p.images.length+' image'+(p.images.length>1?'s':'')+'</div><div class="rs-poster-overlay"><div class="rs-poster-net">'+p.network+'</div><div class="rs-poster-title">'+p.title+'</div></div>';
  g.appendChild(d);
});
function openLB(i){ci=i;ci2=0;var p=P[i];document.getElementById('rs-lb-net').textContent=p.network;document.getElementById('rs-lb-title').textContent=p.title;document.getElementById('rs-lb-total').textContent=p.images.length;rTags(p);rThumbs(p);rImg();document.getElementById('rs-lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('rs-lb').classList.remove('open');document.body.style.overflow='';}
function nav(d){ci2=Math.max(0,Math.min(P[ci].images.length-1,ci2+d));rImg();uThumbs();}
function rImg(){var img=P[ci].images[ci2];document.getElementById('rs-lb-img').src=img.src;document.getElementById('rs-lb-img').alt=img.label;document.getElementById('rs-lb-caption').textContent=img.label;document.getElementById('rs-lb-cur').textContent=ci2+1;document.getElementById('rs-lb-prev').disabled=ci2===0;document.getElementById('rs-lb-next').disabled=ci2===P[ci].images.length-1;}
function rThumbs(p){var w=document.getElementById('rs-lb-thumbs');w.innerHTML='';p.images.forEach(function(img,i){var t=document.createElement('div');t.className='rs-lb-thumb'+(i===0?' active':'');t.onclick=function(){ci2=i;rImg();uThumbs();};t.innerHTML='<img src="'+img.src+'" alt="'+img.label+'" loading="lazy"/><div class="rs-lb-thumb-num">'+(i+1)+'</div>';w.appendChild(t);});}
function uThumbs(){document.querySelectorAll('.rs-lb-thumb').forEach(function(t,i){t.classList.toggle('active',i===ci2);});}
function rTags(p){document.getElementById('rs-lb-tags').innerHTML=p.tags.map(function(t){return'<span class="rs-lb-tag">'+t+'</span>';}).join('');}
document.getElementById('rs-lb').addEventListener('click',function(e){if(e.target===this)closeLB();});
document.addEventListener('keydown',function(e){if(!document.getElementById('rs-lb').classList.contains('open'))return;if(e.key==='ArrowRight')nav(1);if(e.key==='ArrowLeft')nav(-1);if(e.key==='Escape')closeLB();});
</script>
</body>
</html>
